<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QC-PDN PRO - Microvision</title>
    
    <!-- TAG PWA (Progressive Web App) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e40af">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="QC-PDN PRO">
    <link rel="apple-touch-icon" href="https://github.com/MVI-PDN/QC-MPDN/blob/main/LogoApp.png?raw=true">
    <!-- END TAG PWA -->

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .preview-item { transition: all 0.3s ease; }
        .preview-item:hover { transform: scale(1.02); }
        
        /* Animasi Flash Kamera */
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.5; background: white; } 100% { opacity: 1; } }
        .flash-anim { animation: flash 0.15s ease-out; }

        /* Animasi Pop-up Tengah Layar */
        @keyframes bounceShort { 0% { transform: scale(0.8); opacity: 0; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .animate-bounce-short { animation: bounceShort 0.3s ease-out forwards; }

        .progress-striped { background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.2) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.2) 50%, rgba(255, 255, 255, 0.2) 75%, transparent 75%, transparent); background-size: 1rem 1rem; animation: progress-stripes 1s linear infinite; }
        @keyframes progress-stripes { from { background-position: 1rem 0; } to { background-position: 0 0; } }

        @media screen and (orientation: landscape) {
            #cameraOverlay { flex-direction: row !important; }
            #cameraVideo { object-fit: cover; width: 100vw; height: 100vh; }
            #cameraOverlay > div:last-child { width: 120px !important; height: 100vh !important; flex-direction: column !important; justify-content: center !important; padding: 0 !important; background: rgba(0, 0, 0, 0.5); }
            #shutterBtn { width: 70px !important; height: 70px !important; margin: 0 auto; }
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans text-slate-800 pb-20 relative overflow-x-hidden">

    <!-- === MODAL PREVIEW MEDIA === -->
    <div id="mediaPreviewModal" class="hidden fixed inset-0 z-[100] bg-black/95 flex flex-col justify-center items-center backdrop-blur-md transition-opacity">
        <div class="absolute top-0 w-full p-4 flex justify-between items-center z-50 bg-gradient-to-b from-black/80 to-transparent">
            <span id="previewModalTitle" class="text-white text-sm font-bold truncate pr-4">Preview</span>
            <button type="button" onclick="closeMediaPreview()" class="text-white bg-gray-800/50 rounded-full p-2 w-8 h-8 flex items-center justify-center backdrop-blur-sm"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="mediaPreviewContainer" class="w-full h-full flex items-center justify-center p-4"></div>
    </div>

    <!-- === MODAL UPLOAD GAGAL === -->
    <div id="uploadFailModal" class="hidden fixed inset-0 z-[110] bg-slate-900/80 flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all animate-bounce-short p-6 text-center">
            <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl border border-red-50">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h3 class="text-xl font-black text-slate-800 mb-2">Upload Gagal!</h3>
            <p class="text-sm text-slate-500 mb-4">Beberapa foto gagal terupload:</p>
            <div id="failedSNList" class="bg-red-50 p-3 rounded-xl border border-red-100 text-xs font-mono text-red-700 max-h-32 overflow-y-auto custom-scrollbar mb-5 text-left space-y-1.5 shadow-inner"></div>
            <button onclick="hideUploadFailModal()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3.5 rounded-xl transition shadow-lg active:scale-95 text-sm">Tutup & Coba Lagi</button>
        </div>
    </div>

    <!-- === MODAL PILIH KATEGORI === -->
    <div id="categoryModal" class="fixed inset-0 z-50 bg-slate-900 bg-opacity-95 flex flex-col justify-center items-center p-4 transition-all duration-300">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all">
            <div class="bg-blue-800 p-5 text-center">
                <h2 class="text-white font-bold text-lg tracking-wide uppercase">Pilih Kategori Produk</h2>
            </div>
            <div class="p-5 grid grid-cols-2 gap-3">
                <button onclick="selectCategory('MVIFCI')" class="p-3 bg-slate-50 border-2 border-slate-200 rounded-xl font-bold text-sm hover:border-blue-500 transition">MVIFCI</button>
                <button onclick="selectCategory('MVIFCO')" class="p-3 bg-slate-50 border-2 border-slate-200 rounded-xl font-bold text-sm hover:border-blue-500 transition">MVIFCO</button>
                <button onclick="selectCategory('MVIDCI')" class="p-3 bg-slate-50 border-2 border-slate-200 rounded-xl font-bold text-sm hover:border-blue-500 transition">MVIDCI</button>
                <button onclick="selectCategory('KIOSK')" class="p-3 bg-slate-50 border-2 border-slate-200 rounded-xl font-bold text-sm hover:border-blue-500 transition">KIOSK</button>
                <button onclick="selectCategory('IFP')" class="p-3 bg-slate-50 border-2 border-slate-200 rounded-xl font-bold text-sm hover:border-blue-500 transition">IFP</button>
                <button onclick="selectCategory('VDW')" class="p-3 bg-slate-50 border-2 border-slate-200 rounded-xl font-bold text-sm hover:border-blue-500 transition">VDW</button>
            </div>
        </div>
    </div>

    <!-- === CAMERA OVERLAY === -->
    <div id="cameraOverlay" class="hidden fixed inset-0 z-[60] bg-black flex flex-col">
        <div class="absolute top-0 w-full p-4 flex justify-between items-center z-10 bg-gradient-to-b from-black/60 to-transparent">
            <div id="modeIndicator" class="text-white text-xs font-mono bg-black/30 px-2 py-1 rounded border border-white/20 uppercase">Foto Mode</div>
            <button type="button" onclick="closeCamera()" class="text-white bg-gray-800/50 rounded-full p-2 w-8 h-8 flex items-center justify-center backdrop-blur-sm"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div class="flex-1 relative bg-black flex items-center justify-center overflow-hidden">
            <video id="cameraVideo" autoplay playsinline muted class="absolute w-full h-full object-cover"></video>
            <canvas id="cameraCanvas" class="hidden"></canvas>
            <div id="watermarkPreview" class="absolute bottom-4 left-4 bg-black/50 text-white p-2 rounded text-[10px] font-mono opacity-50 border border-white/20">
                <div class="font-bold text-blue-300">AUTO-WATERMARK AKTIF</div>
            </div>
        </div>

        <div class="bg-black/90 pb-10 pt-5 px-6 flex flex-col items-center gap-5">
            <div class="flex bg-gray-800 rounded-full p-1 gap-1">
                <button id="btnModePhoto" class="px-4 py-1.5 rounded-full text-xs font-bold transition-all bg-white text-black">FOTO</button>
                <button id="btnModeVideo" class="px-4 py-1.5 rounded-full text-xs font-bold transition-all text-gray-400 opacity-50 cursor-not-allowed">VIDEO</button>
            </div>
            <div class="flex items-center justify-between w-full max-w-xs mx-auto">
                <div class="w-14"></div> 
                <button id="shutterBtn" onclick="handleShutter()" class="w-20 h-20 rounded-full border-4 border-white flex items-center justify-center transition-all duration-100 shadow-[0_0_15px_rgba(255,255,255,0.3)] active:scale-90">
                    <div id="shutterInner" class="w-16 h-16 rounded-full bg-white border-2 border-black transition-all"></div>
                </button>
                <div class="w-14 flex justify-center">
                    <button id="btnFinishCamera" onclick="closeCamera()" class="hidden flex-col items-center gap-1 text-white active:scale-90 transition">
                        <div class="relative">
                            <div class="w-10 h-10 rounded-full bg-green-600 flex items-center justify-center border-2 border-white"><i class="fa-solid fa-check"></i></div>
                            <div id="camCountBadge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center border border-white">0</div>
                        </div>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- === HEADER GLOBAL === -->
    <div class="bg-white/90 backdrop-blur-md p-4 border-b border-slate-200 sticky top-0 z-20 shadow-sm flex items-center justify-between max-w-xl mx-auto sm:rounded-t-xl sm:mt-8">
        <div class="flex items-center gap-3">
            <img src="https://github.com/MVI-PDN/QC-MPDN/blob/main/logo.png?raw=true" alt="Microvision Logo" class="h-9 w-auto max-w-[160px] object-contain">
            <div id="gpsStatus" class="flex items-center justify-center w-8 h-8 bg-slate-100 rounded-md border border-slate-200"><i class="fa-solid fa-location-crosshairs text-slate-400 text-sm"></i></div>
        </div>
        <div class="flex items-center gap-2">
            <button id="headerCatBtn" onclick="openModal()" class="flex items-center gap-2 bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg text-xs font-bold border border-blue-200">
                <span id="currentCategoryDisplay">PILIH KATEGORI</span><i class="fa-solid fa-chevron-down"></i>
            </button>
        </div>
    </div>

    <!-- === KONTEN UTAMA === -->
    <div class="max-w-xl mx-auto bg-white min-h-[85vh] sm:rounded-b-xl sm:shadow-xl overflow-hidden relative mb-20">
        
        <!-- TAB 1: QC -->
        <div id="tabQC" class="p-5 space-y-5 block">
            <form id="qcForm" class="space-y-4">
                <input type="hidden" id="category" name="category">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Range Serial Number / Batch</label>
                    <input type="text" id="rangeSN" class="w-full p-3 rounded-lg border border-slate-300 focus:border-blue-500 outline-none text-sm font-semibold bg-slate-50" placeholder="Ketik Range SN...">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Nama Project (Opsional)</label>
                    <input type="text" id="project" class="w-full p-3 rounded-lg border border-slate-300 focus:border-blue-500 outline-none text-sm font-semibold bg-slate-50" placeholder="Ketik Nama Project...">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Serial Number (SN)</label>
                    <input type="text" id="sn" required class="w-full p-3 rounded-lg border border-slate-300 focus:border-blue-500 outline-none text-sm font-mono bg-slate-50" placeholder="Scan / Ketik SN Unit">
                    <p id="snError" class="text-xs font-bold text-red-500 mt-1.5 hidden"><i class="fa-solid fa-circle-exclamation"></i> SN wajib diisi!</p>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Catatan</label>
                    <textarea id="notes" rows="2" class="w-full p-3 rounded-lg border border-slate-300 focus:border-blue-500 outline-none text-sm bg-slate-50" placeholder="Keterangan tambahan..."></textarea>
                </div>
                
                <div class="pt-2 border-t border-dashed border-slate-300">
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div onclick="startCamera()" class="flex flex-col items-center justify-center p-4 border-2 border-blue-100 bg-blue-50 rounded-xl cursor-pointer hover:bg-blue-100 transition text-blue-600 shadow-sm active:scale-95">
                            <i class="fa-solid fa-camera text-2xl mb-1"></i>
                            <span class="text-xs font-bold">Buka Kamera</span>
                        </div>
                        <label class="flex flex-col items-center justify-center p-4 border-2 border-slate-100 bg-slate-50 rounded-xl cursor-pointer hover:bg-slate-100 transition text-slate-600 shadow-sm active:scale-95">
                            <i class="fa-solid fa-images text-2xl mb-1"></i>
                            <span class="text-xs font-bold">Galeri</span>
                            <input type="file" id="galleryInput" accept="image/*" class="hidden" multiple>
                        </label>
                    </div>

                    <div id="previewContainer" class="space-y-3 hidden">
                        <div class="flex justify-between items-center text-sm text-slate-500 border-b pb-2">
                            <span>Siap Diupload: <b id="fileCount">0</b> file</span>
                            <button type="button" onclick="clearAllFiles()" class="text-red-500 text-xs font-bold">Hapus Semua</button>
                        </div>
                        <div id="previewList" class="max-h-60 overflow-y-auto space-y-2 pr-1 custom-scrollbar"></div>
                    </div>
                </div>
                <button type="submit" id="submitBtn" disabled class="w-full bg-slate-400 text-white font-bold py-4 rounded-xl shadow-lg flex justify-center items-center gap-2 transition cursor-not-allowed">
                    <span id="btnText">Pilih File Dulu</span>
                </button>
            </form>

            <!-- LIVE HISTORY -->
            <div class="mt-6 bg-slate-50 border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                <div class="bg-blue-600 px-4 py-3 flex justify-between items-center">
                    <h3 id="liveHistoryTitle" class="text-white text-xs font-bold flex items-center gap-2"><i class="fa-solid fa-clock-rotate-left"></i> Last S/N</h3>
                    <button type="button" onclick="fetchLiveHistory()" class="text-blue-200"><i id="refreshHistoryIcon" class="fa-solid fa-rotate-right"></i></button>
                </div>
                <div id="liveHistoryList" class="p-3 max-h-48 overflow-y-auto custom-scrollbar space-y-2">
                    <div class="text-center py-4 text-slate-400 text-xs italic">Pilih Kategori Produk terlebih dahulu.</div>
                </div>
            </div>
        </div>

        <!-- TAB 2: DATABASE -->
        <div id="tabDownload" class="hidden p-5 space-y-5 bg-slate-50 min-h-full">
            <div id="downloadBreadcrumb" class="flex items-center gap-2 text-sm font-medium text-slate-600"></div>
            <div id="downloadContent" class="space-y-3"></div>
        </div>

        <!-- TAB 3: PDF -->
        <div id="tabPDF" class="hidden p-5 space-y-5 bg-slate-50 min-h-full">
            <div class="bg-white rounded-2xl border border-blue-100 p-6 shadow-sm">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-10 h-10 bg-red-50 text-red-600 rounded-xl flex items-center justify-center"><i class="fa-solid fa-file-pdf text-xl"></i></div>
                    <h3 class="font-black text-slate-800">Bikin Laporan PDF</h3>
                </div>
                <input type="text" id="pdfSearchFolder" class="w-full p-4 rounded-xl border mb-3 text-sm outline-none" placeholder="Ketik Nama Folder Drive...">
                <input type="text" id="pdfProjectName" class="w-full p-4 rounded-xl border mb-3 text-sm outline-none" placeholder="Nama Project (Untuk PDF)...">
                <input type="text" id="pdfRangeSN" class="w-full p-4 rounded-xl border mb-4 text-sm outline-none" placeholder="Range SN (Untuk PDF)...">
                <button onclick="requestPDF()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition">Proses Sekarang</button>
            </div>
        </div>
    </div>
    
    <!-- PROGRESS UPLOAD -->
    <div id="floatingProgress" class="fixed top-24 right-4 z-[70] bg-white rounded-xl shadow-2xl p-4 border border-slate-200 w-64 transform transition-all hidden">
        <div class="flex items-center gap-3 mb-2">
            <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600"><i class="fa-solid fa-cloud-arrow-up fa-fade"></i></div>
            <div class="flex-1 min-w-0"><h4 class="text-xs font-bold text-slate-700">Sisa Antrean: <span id="bgQueueCount">0</span></h4></div>
        </div>
        <div class="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden"><div id="bgQueueBar" class="bg-blue-500 h-1.5 rounded-full" style="width: 0%"></div></div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="fixed bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-200 flex justify-around p-2 z-50 shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
        <button onclick="switchTab('qc')" id="navQC" class="flex-1 flex flex-col items-center text-blue-600 font-bold"><i class="fa-solid fa-camera-retro text-xl mb-1"></i><span class="text-[10px]">Input QC</span></button>
        <button onclick="switchTab('download')" id="navDownload" class="flex-1 flex flex-col items-center text-slate-400"><i class="fa-solid fa-database text-xl mb-1"></i><span class="text-[10px]">Database</span></button>
        <button onclick="switchTab('pdf')" id="navPDF" class="flex-1 flex flex-col items-center text-slate-400"><i class="fa-solid fa-file-pdf text-xl mb-1"></i><span class="text-[10px]">Laporan</span></button>
    </div>

    <!-- TOAST -->
    <div id="toast" class="fixed bottom-20 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl opacity-0 transition-all z-[90] text-sm font-medium text-white flex items-center gap-2 pointer-events-none whitespace-nowrap"></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx6CuVEhoVzuivKLq_fZu65yc8VVJ6mO45uMx06GVkdsCjCTTEhcKsP92qB2EtYqusk/exec"; 

        // ==========================================
        // AUDIO SYSTEM (RESTORED & OPTIMIZED)
        // ==========================================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

        function playSoundSuccess() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            playTone(783.99, now, 0.15, 'sine', 0.5);          // G5
            playTone(1046.50, now + 0.12, 0.15, 'sine', 0.5);   // C6
            playTone(1318.51, now + 0.24, 0.8, 'triangle', 0.5); // E6
        }

        function playSoundError() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            // Bunyi Tet! Tet! (2x Cepat Tajam) - VOLUME 1.0 (Full)
            playTone(220, now, 0.08, 'square', 1.0);
            playTone(220, now + 0.15, 0.08, 'square', 1.0);
        }

        function playTone(freq, time, duration, type, volume) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, time);
            gain.gain.setValueAtTime(volume, time); 
            gain.gain.exponentialRampToValueAtTime(0.001, time + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(time);
            osc.stop(time + duration);
        }

        // ==========================================
        // CAMERA LOGIC (NO DELAY SHUTTER)
        // ==========================================
        let fileQueue = []; 
        let previewIndex = 0;
        let videoStream = null;
        let backgroundQueue = [];
        let isUploading = false;
        let currentLocationStr = "Lokasi: Menunggu GPS...";

        async function startCamera() {
            initAudio(); 
            const snValue = document.getElementById('sn').value.trim(); 
            if (!snValue) { 
                playSoundError(); 
                document.getElementById('snError').classList.remove('hidden'); 
                document.getElementById('sn').focus(); 
                return; 
            }
            try {
                const constraints = { video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 } }, audio: false };
                videoStream = await navigator.mediaDevices.getUserMedia(constraints);
                document.getElementById('cameraVideo').srcObject = videoStream;
                document.getElementById('cameraOverlay').classList.remove('hidden');
                window.location.hash = 'camera';
                updateCamBadge();
            } catch (err) { showToast("Gagal akses kamera.", "error"); }
        }

        function handleShutter() {
            if (!videoStream) return;
            // Instan Feedback Visual
            const overlay = document.getElementById('cameraOverlay');
            overlay.classList.add('flash-anim');
            setTimeout(() => overlay.classList.remove('flash-anim'), 150);

            const video = document.getElementById('cameraVideo');
            const canvas = document.getElementById('cameraCanvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            
            // Draw Watermark
            drawWatermark(ctx, canvas.width, canvas.height);
            
            canvas.toBlob((blob) => {
                const file = new File([blob], `Foto_${Date.now()}.jpg`, { type: "image/jpeg" });
                fileQueue.push(file);
                renderPreview();
                updateSubmitBtn();
                updateCamBadge();
            }, 'image/jpeg', 0.9);
        }

        function drawWatermark(ctx, w, h) {
            const snVal = document.getElementById('sn').value.trim();
            const proj = document.getElementById('project').value.trim();
            const now = new Date();
            const timeStr = now.toLocaleDateString('id-ID') + " - " + now.toLocaleTimeString('id-ID');
            const fontSize = Math.max(12, Math.floor(w * 0.015));
            ctx.font = `bold ${fontSize}px sans-serif`;
            const text = `S/N: ${snVal} | ${proj} | ${timeStr}`;
            const boxW = ctx.measureText(text).width + 20;
            ctx.fillStyle = "rgba(0,0,0,0.6)";
            ctx.fillRect(10, h - (fontSize * 2), boxW, fontSize + 10);
            ctx.fillStyle = "white";
            ctx.fillText(text, 20, h - (fontSize * 1.2));
        }

        function closeCamera() {
            if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
            document.getElementById('cameraOverlay').classList.add('hidden');
            if (window.location.hash === '#camera') window.history.back();
        }

        function updateCamBadge() {
            const badge = document.getElementById('camCountBadge');
            const btnFinish = document.getElementById('btnFinishCamera');
            if (fileQueue.length > 0) {
                badge.textContent = fileQueue.length;
                btnFinish.classList.remove('hidden');
            } else { btnFinish.classList.add('hidden'); }
        }

        // ==========================================
        // PREVIEW SYSTEM
        // ==========================================
        function renderPreview() {
            const list = document.getElementById('previewList');
            list.innerHTML = '';
            fileQueue.forEach((file, index) => {
                const url = URL.createObjectURL(file);
                const div = document.createElement('div');
                div.className = 'flex items-center gap-3 bg-slate-50 p-2 rounded-lg border border-slate-200 preview-item';
                div.innerHTML = `
                    <div onclick="openMediaPreview(${index})" class="w-10 h-10 overflow-hidden rounded bg-white border cursor-pointer">
                        <img src="${url}" class="w-full h-full object-cover">
                    </div>
                    <div onclick="openMediaPreview(${index})" class="flex-1 truncate text-xs font-bold text-slate-700 cursor-pointer">${file.name}</div>
                    <button type="button" onclick="removeFile(${index})" class="text-red-400 px-2"><i class="fa-solid fa-trash"></i></button>`;
                list.appendChild(div);
            });
            document.getElementById('previewContainer').classList.toggle('hidden', fileQueue.length === 0);
            document.getElementById('fileCount').textContent = fileQueue.length;
        }

        function openMediaPreview(index) {
            const file = fileQueue[index];
            const container = document.getElementById('mediaPreviewContainer');
            document.getElementById('previewModalTitle').textContent = file.name;
            container.innerHTML = `<img src="${URL.createObjectURL(file)}" class="max-w-full max-h-full rounded-lg shadow-xl">`;
            document.getElementById('mediaPreviewModal').classList.remove('hidden');
            window.location.hash = 'preview';
        }

        function closeMediaPreview() {
            document.getElementById('mediaPreviewModal').classList.add('hidden');
            if (window.location.hash === '#preview') window.history.back();
        }

        // ==========================================
        // LOGIKA GLOBAL LAINNYA
        // ==========================================
        function selectCategory(cat) {
            document.getElementById('category').value = cat;
            document.getElementById('currentCategoryDisplay').textContent = cat;
            document.getElementById('categoryModal').classList.add('opacity-0', 'pointer-events-none');
            fetchLiveHistory();
        }

        function openModal() { document.getElementById('categoryModal').classList.remove('opacity-0', 'pointer-events-none'); }

        window.addEventListener('hashchange', () => {
            if (window.location.hash !== '#camera') document.getElementById('cameraOverlay').classList.add('hidden');
            if (window.location.hash !== '#preview') document.getElementById('mediaPreviewModal').classList.add('hidden');
        });

        function showToast(m, t) {
            const toast = document.getElementById('toast');
            toast.textContent = m;
            toast.className = `fixed bottom-20 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl z-[90] text-sm font-medium text-white flex items-center gap-2 ${t === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
            toast.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => toast.classList.replace('opacity-100', 'opacity-0'), 3000);
        }

        function removeFile(i) { fileQueue.splice(i, 1); renderPreview(); updateSubmitBtn(); updateCamBadge(); }
        function clearAllFiles() { fileQueue = []; renderPreview(); updateSubmitBtn(); updateCamBadge(); }

        function updateSubmitBtn() {
            const btn = document.getElementById('submitBtn');
            const txt = document.getElementById('btnText');
            btn.disabled = fileQueue.length === 0;
            btn.className = `w-full font-bold py-4 rounded-xl shadow-lg flex justify-center items-center gap-2 transition ${fileQueue.length > 0 ? 'bg-blue-600 active:scale-95' : 'bg-slate-400 cursor-not-allowed'}`;
            txt.textContent = fileQueue.length > 0 ? `Upload ${fileQueue.length} File` : "Pilih File Dulu";
        }

        document.getElementById('qcForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (fileQueue.length === 0) return;
            initAudio();
            
            const cat = document.getElementById('category').value;
            const snVal = document.getElementById('sn').value.trim();
            const range = document.getElementById('rangeSN').value.trim();
            const proj = document.getElementById('project').value.trim();
            const notes = document.getElementById('notes').value.trim();

            fileQueue.forEach(f => backgroundQueue.push({ fileObj: f, category: cat, rangeSN: range, project: proj, sn: snVal, notes: notes }));
            
            clearAllFiles();
            document.getElementById('sn').value = '';
            showToast("Antrean upload dimulai...", "success");
            if (!isUploading) processBackgroundQueue();
        });

        async function processBackgroundQueue() {
            if (backgroundQueue.length === 0) {
                isUploading = false;
                document.getElementById('floatingProgress').classList.add('hidden');
                if (failedUploads.length > 0) {
                    const list = document.getElementById('failedSNList');
                    list.innerHTML = failedUploads.map(s => `<div>• ${s}</div>`).join('');
                    document.getElementById('uploadFailModal').classList.remove('hidden');
                    playSoundError();
                    failedUploads = [];
                } else {
                    playSoundSuccess();
                    fetchLiveHistory();
                    showToast("Semua upload sukses!", "success");
                }
                return;
            }

            isUploading = true;
            document.getElementById('floatingProgress').classList.remove('hidden');
            const item = backgroundQueue.shift();
            document.getElementById('bgQueueCount').textContent = backgroundQueue.length + 1;
            document.getElementById('bgQueueBar').style.width = "50%";

            try {
                const base64 = await toBase64(item.fileObj);
                const req = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "upload", category: item.category, rangeSN: item.rangeSN, project: item.project, sn: item.sn, notes: item.notes, filename: item.fileObj.name, file: base64 }) });
                const res = await req.json();
                if (res.result !== 'success') throw new Error();
                document.getElementById('bgQueueBar').style.width = "100%";
            } catch (e) { failedUploads.push(item.sn); }
            
            setTimeout(processBackgroundQueue, 500);
        }

        async function fetchLiveHistory() {
            const cat = document.getElementById('category').value;
            if (!cat) return;
            const list = document.getElementById('liveHistoryList');
            try {
                const req = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "getLiveHistory", category: cat }) });
                const res = await req.json();
                if (res.result === 'success') {
                    list.innerHTML = res.data.map(h => `
                        <div class="bg-white p-2 rounded-lg border border-slate-100 shadow-sm">
                            <div class="flex justify-between text-[10px] text-blue-600 font-bold"><span>${h.kategori}</span><span>${h.waktu}</span></div>
                            <div class="text-xs font-black text-slate-700 mt-1 uppercase">SN: ${h.sn}</div>
                        </div>
                    `).join('');
                }
            } catch (e) {}
        }

        async function requestPDF() {
            initAudio();
            const folder = document.getElementById('pdfSearchFolder').value;
            if (!folder) return showToast("Folder wajib diisi!", "error");
            try {
                showToast("Sedang meracik PDF...", "success");
                const req = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'initPDF', folderQuery: folder, projectName: document.getElementById('pdfProjectName').value, rangeSN: document.getElementById('pdfRangeSN').value }) });
                const res = await req.json();
                if (res.result === 'success') { window.open(res.link); playSoundSuccess(); } else throw new Error();
            } catch (e) { playSoundError(); showToast("Gagal buat PDF", "error"); }
        }

        function toBase64(file) { return new Promise((resolve, reject) => { const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = () => resolve(reader.result); reader.onerror = reject; }); }
        
        document.addEventListener("DOMContentLoaded", () => { openModal(); document.getElementById('sn').addEventListener('input', () => document.getElementById('snError').classList.add('hidden')); });
    </script>
</body>
</html>
